<!DOCTYPE html>
<html>
<head>
  <title>GPS Tracker</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    #map { height: 400px; }

    #status {
      margin: 10px 0;
      font-weight: bold;
    }

    .recording {
      color: red;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>

<body>

<h2>GPS Tracker</h2>

<button onclick="startTracking()">Start</button>
<button onclick="stopTracking()">Stop & Download</button>

<div id="status">Status: Stopped</div>
<div id="timer">Time: 0 sec</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([0, 0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

let intervalId = null;
let timerId = null;

let seconds = 0;
let path = [];

let polyline = L.polyline([], { color: 'blue' }).addTo(map);

// 📍 Status update
function updateStatus(isRecording) {
  let status = document.getElementById("status");

  if (isRecording) {
    status.innerHTML = "🔴 Recording...";
    status.classList.add("recording");
  } else {
    status.innerHTML = "⏹ Stopped";
    status.classList.remove("recording");
  }
}

// ▶️ Start Tracking
function startTracking() {
  if (intervalId) return;

  path = [];
  seconds = 0;
  polyline.setLatLngs([]);

  updateStatus(true);

  // ⏱ Timer
  timerId = setInterval(() => {
    seconds++;
    document.getElementById("timer").innerText = "Time: " + seconds + " sec";
  }, 1000);

  // 📍 GPS tracking every 1 sec
  intervalId = setInterval(() => {
    navigator.geolocation.getCurrentPosition((pos) => {
      let lat = pos.coords.latitude;
      let lng = pos.coords.longitude;

      path.push([lat, lng]);
      polyline.addLatLng([lat, lng]);

      map.setView([lat, lng], 16);

      console.log(lat, lng);
    }, (err) => console.log(err), {
      enableHighAccuracy: true
    });
  }, 1000);
}

// ⏹ Stop + Auto Download
function stopTracking() {
  clearInterval(intervalId);
  clearInterval(timerId);

  intervalId = null;
  timerId = null;

  updateStatus(false);

  console.log("Full Path:", path);

  downloadJSON();
  downloadCSV();
}

// 📥 JSON Download
function downloadJSON() {
  let dataStr = "data:text/json;charset=utf-8," +
    encodeURIComponent(JSON.stringify(path));

  let link = document.createElement("a");
  link.href = dataStr;
  link.download = "gps_path.json";
  link.click();
}

// 📥 CSV Download
function downloadCSV() {
  let csv = "Latitude,Longitude\n";

  path.forEach(p => {
    csv += p[0] + "," + p[1] + "\n";
  });

  let dataStr = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);

  let link = document.createElement("a");
  link.href = dataStr;
  link.download = "gps_path.csv";
  link.click();
}
</script>

</body>
</html>
