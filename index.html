<!DOCTYPE html>
<html>
<head>
  <title>GPS Tracker</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    #map { height: 400px; }
  </style>
</head>

<body>

<h2>GPS Tracker</h2>

<button onclick="startTracking()">Start</button>
<button onclick="stopTracking()">Stop</button>
<button onclick="clearData()">Clear Data</button>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// Map init
let map = L.map('map').setView([0, 0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

let watchId;
let path = [];
let polyline = L.polyline([], {color: 'blue'}).addTo(map);

// Start tracking
function startTracking() {
  watchId = navigator.geolocation.watchPosition((pos) => {
    let lat = pos.coords.latitude;
    let lng = pos.coords.longitude;

    path.push([lat, lng]);
    polyline.addLatLng([lat, lng]);

    map.setView([lat, lng], 16);
  });
}

// Stop + save
function stopTracking() {
  navigator.geolocation.clearWatch(watchId);

  localStorage.setItem("gpsPath", JSON.stringify(path));

  console.log("Saved Path:", path);
}

// Load saved data on refresh
window.onload = function () {
  let saved = localStorage.getItem("gpsPath");

  if (saved) {
    let savedPath = JSON.parse(saved);

    path = savedPath; // important

    savedPath.forEach(p => polyline.addLatLng(p));

    if (savedPath.length > 0) {
      map.setView(savedPath[savedPath.length - 1], 16);
    }
  }
};

// Clear saved data
function clearData() {
  localStorage.removeItem("gpsPath");
  location.reload();
}
</script>

</body>
</html>
