<!DOCTYPE html>
<html>
<head>
  <title>GPS Tracker</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    #map { height: 400px; }
  </style>
</head>

<body>

<h2>GPS Tracker</h2>

<button onclick="startTracking()">Start</button>
<button onclick="stopTracking()">Stop & Download</button>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([0, 0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

let intervalId;
let path = [];
let polyline = L.polyline([], {color: 'blue'}).addTo(map);

function startTracking() {
  if (intervalId) return;

  intervalId = setInterval(() => {
    navigator.geolocation.getCurrentPosition((pos) => {
      let lat = pos.coords.latitude;
      let lng = pos.coords.longitude;

      path.push([lat, lng]);
      polyline.addLatLng([lat, lng]);

      map.setView([lat, lng], 16);

      console.log("Lat:", lat, "Lng:", lng);
    }, (err) => console.log(err), {
      enableHighAccuracy: true
    });
  }, 1000); // हर 1 second
}

function stopTracking() {
  clearInterval(intervalId);
  intervalId = null;

  console.log("Full Path:", path);

  // 📥 Download as JSON file
  let dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(path));
  let dlAnchor = document.createElement('a');
  dlAnchor.setAttribute("href", dataStr);
  dlAnchor.setAttribute("download", "gps_path.json");
  dlAnchor.click();
}
</script>

</body>
</html>
